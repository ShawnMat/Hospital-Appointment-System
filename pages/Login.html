<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <!-- Login CSS File -->
    <link rel="stylesheet" href="/styles/Login.css">
</head>
<body>
    <div class="container-fluid">
    <div class="row">
        <div class="col-7 p-0">
            <img src="/assets/images/background Images/AdminLoginImage.jpg" class="" id="adminLoginImage">
        </div>
        <div class="col-5 d-flex flex-column justify-content-center align-items-center" id="adminLoginArea">
            <form class="w-50 h-50 rounded-2 p-3 d-flex flex-column gap-3 bg-white">
                <h3 id="adminLoginHeading">ADMIN LOGIN</h3>
                <div class="usernameContainer">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" placeholder="Enter your Username" id="username">
                    <p id="usernameError"></p>
                </div>
                <div class="passwordContainer">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Enter your Password" id="password">
                    <p id="passwordError"></p>
                </div>
                <div class="d-flex align-items-center flex-column gap-2  " id="loginBtnContainer">
                    <button class="btn text-white w-50" id="adminLoginBtn">Login</button>
                    
                </div>
            </form>
        </div>
    </div>
   </div>


    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/AdminLogin.js"></script>
</body>
</html>

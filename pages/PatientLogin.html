        <form class="p-3 w-25 d-flex flex-column bg-light rounded-3 shadow-lg  ">
            <p class="mb-3 fs-3 text-center">Patient Login</p>
            <label for="username" class="mb-2  form-label">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username" class="p-1 rounded-2 border-1 mb-2 form-control">
            <label for="password" class="mb-2 form-label">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" class="p-1 rounded-2 border-1 mb-2 form-control">
            <div class="loginBtn-cont    d-flex justify-content-center mt-3">
                <button class="btn bg-primary w-50 text-white" type="button" id="loginBtn">Login</button>
            </div>
        </form>
